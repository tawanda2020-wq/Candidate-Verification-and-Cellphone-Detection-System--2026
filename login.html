<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ExamGuard - Admin Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="css/login_style.css">
</head>
<body>
<div class="grid-bg"></div>
<div class="glow-center"></div>

<div class="page">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <a href="index.html" class="brand">
      <div class="brand-logo">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      </div>
      <span class="brand-name">Exam<span>Guard</span></span>
    </a>

    <div class="left-content">
      <h2>Secure Access<br/>to the <span class="accent">Control Centre</span></h2>
    </div>

    <div class="left-footer">· Candidate Verification & Cellphone Detection System ·</div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="login-card">
      <div class="login-header">
        <div class="shield-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <h1>Admin Portal</h1>
        <p></p>
      </div>

      <!-- Status messages -->
      <div class="msg error" id="msgError">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="msgErrorText">Invalid credentials.</span>
      </div>
      <div class="msg loading" id="msgLoading">
        <div class="spinner"></div>
        <span>Verifying credentials…</span>
      </div>
      <div class="msg success" id="msgSuccess">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Login successful! Redirecting…</span>
      </div>

      <!-- FORM - uses div not form tag per UI requirements -->
      <div>
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
          </div>
        </div>

        <div class="form-options">
          <label class="remember">
            <input type="checkbox" id="rememberMe"/> Remember me
          </label>
        </div>

        <button class="btn-submit" id="btnLogin" onclick="handleLogin()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Sign In
        </button>
      </div>

      <div class="divider">or</div>

      <a href="index.html" class="back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
        Back to Welcome Page
      </a>
    </div>
  </div>

</div><!-- .page -->

<script src="js/login_js.js"></script>
</body>
</html>
